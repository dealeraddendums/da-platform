name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ec2-54-167-226-23.compute-1.amazonaws.com >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@ec2-54-167-226-23.compute-1.amazonaws.com '
            set -e
            export PATH="/usr/bin:/usr/local/bin:$PATH"
            cd /var/www/da-platform
            for i in 1 2 3; do git pull origin main && break || { echo "git pull attempt $i failed, retrying..."; sleep 10; }; done
            /usr/bin/npm ci
            /usr/bin/npm run build
            pm2 restart da-platform || pm2 start ecosystem.config.js
            echo "Deploy complete"
          '
